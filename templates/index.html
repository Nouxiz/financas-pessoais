<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças da silva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Transações</h1>
        <form>
            <div class="mb-3">
                <label>Tipo</label>
                <select name="tipo" class="form-control" id="tipo">
                    <option value="receita">Receita</option>
                    <option value="despesa">Despesa</option>
                </select>
            </div>
        
            <div class="mb-3">
                <label>Valor</label>
                <input type="number" name="valor" id="valor" class="form-control">
            </div>

            <div class="mb-3">
                <label>Categoria</label>
                <select name="categoria" class="form-control" id="categoria">
                    <option value="Alimentação">Alimentação</option>
                    <option value="Transporte">Transporte</option>
                    <option value="Moradia">Moradia</option>
                    <option value="Saúde">Saúde</option>
                    <option value="Educação">Educação</option>
                    <option value="Lazer">Lazer</option>
                    <option value="Roupas">Roupas</option>
                    <option value="Assinaturas">Assinaturas</option>
                    <option value="Outros">Outros</option>

                </select>
            </div>

            <div class="mb-3">
                <label>Data</label>
                <input type="date"   name="data" id="data" class="form-control">
            </div>

            <div class="mb-3">
                <label>Descricao</label>
                <input type="text"   name="descricao" id="descricao" class="form-control">
            </div>
            
            <button type="button" class="btn btn-primary" onclick="adicionarTransacao()">Enviar</button>
        </form>
    </div>
    <div class="container mt-4">
        <h1>Limites</h1>
        <form>
            <div class="mb-3">
                <label>Categoria</label>
                <select name="categoria_limite" class="form-control" id="categoria_limite">
                    <option value="Alimentacão">Alimentação</option>
                    <option value="Transporte">Transporte</option>
                    <option value="Moradia">Moradia</option>
                    <option value="Saúde">Saúde</option>
                    <option value="Educação">Educação</option>
                    <option value="Lazer">Lazer</option>
                    <option value="Roupas">Roupas</option>
                    <option value="Assinaturas">Assinaturas</option>
                    <option value="Outros">Outros</option>

                </select>
            </div>

            <div class="mb-3">
                <label>Valor Máximo</label>
                <input type="number" name="valor_max" id="valor_max" class="form-control">
            </div>

            <div class="mb-3">
                <label>Mês</label>
                <input type="text" name="mes" id="mes" class="form-control">
            </div>

            <button type="button" class="btn btn-primary" onclick="adicionarLimite()">Enviar</button>
            <button type="button" class="btn btn-primary" onclick="listarTransacoes()">Ver transações</button>
            
        </form>
        <div>
            <table class="table mt-4">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tipo</th>
                        <th>Valor</th>
                        <th>Categoria</th>
                        <th>Data</th>
                        <th>Descrição</th>
                </tr>
        </thead>
            <tbody id="tabela-transacoes">
        </tbody>
    </table>
</div>
    </div>
    <script src="{{  url_for('static', filename='jonson.js')}}"></script>
</body>
</html>
